# =============================================================================
# EXAMPLE APPLICATION CRD
# =============================================================================
#
# This is what developers will create to provision their application.
# The platform reads this and:
#   1. Creates a Deployment with the specified image
#   2. Provisions infrastructure (database, cache, etc.) via Terraform
#   3. Injects connection credentials as environment variables
#   4. Sets up monitoring, autoscaling, and service mesh integration
#
# APPLY WITH:
#   kubectl apply -f examples/payments-api.yaml
#
# WATCH STATUS:
#   kubectl get applications payments-api -w
#
# =============================================================================

apiVersion: platform.platform.goplatform.io/v1alpha1
kind: Application
metadata:
  name: payments-api
  namespace: default
  labels:
    # Optional: Additional labels for filtering/grouping
    app.kubernetes.io/name: payments-api
    app.kubernetes.io/component: api
spec:
  # ===========================================================================
  # OWNERSHIP
  # ===========================================================================
  # Who owns this service? Used for:
  #   - Cost allocation (team budget tracking)
  #   - Access control (only team members can modify)
  #   - Service catalog (who to contact about this service)
  #   - Incident routing (PagerDuty/Slack alerts)
  
  team: payments
  owner: alice@example.com
  tier: standard  # critical | standard | development

  # ===========================================================================
  # WORKLOAD
  # ===========================================================================
  # What container to run? The platform creates a Deployment with these settings.
  # Connection credentials for database/cache are AUTO-INJECTED as env vars.
  
  workload:
    image: ghcr.io/example/payments-api:v1.0.0
    replicas: 3
    
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi
    
    ports:
      - name: http
        containerPort: 8080
      - name: metrics
        containerPort: 9090
    
    healthCheck:
      path: /health
      port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10
    
    # Additional env vars (connection strings are auto-injected)
    env:
      - name: LOG_LEVEL
        value: info
      - name: ENVIRONMENT
        value: production

  # ===========================================================================
  # SCALING
  # ===========================================================================
  # Horizontal Pod Autoscaler configuration
  
  scaling:
    minReplicas: 2
    maxReplicas: 10
    metrics:
      - type: cpu
        target: 70  # Scale up when CPU > 70%
      - type: memory
        target: 80  # Scale up when memory > 80%

  # ===========================================================================
  # DATABASE
  # ===========================================================================
  # Platform provisions this as RDS (AWS), Cloud SQL (GCP), or CloudNativePG (local)
  # Connection string is injected as DATABASE_URL environment variable
  
  database:
    type: postgres
    version: "15"          # Major version only
    size: small            # small | medium | large | xlarge
    highAvailability: true # Multi-AZ for production
    backup:
      enabled: true
      retentionDays: 7
      window: "03:00-04:00"

  # ===========================================================================
  # CACHE
  # ===========================================================================
  # Platform provisions this as ElastiCache (AWS), Memorystore (GCP), or Redis operator (local)
  # Connection string is injected as REDIS_URL environment variable
  
  cache:
    type: redis
    size: small
    highAvailability: true

  # ===========================================================================
  # QUEUE
  # ===========================================================================
  # Platform provisions this as SQS (AWS), Cloud Tasks (GCP), or RabbitMQ (local)
  # Queue URL is injected as QUEUE_URL environment variable
  
  queue:
    type: sqs
    fifo: false
    deadLetterQueue:
      enabled: true
      maxReceiveCount: 5

  # ===========================================================================
  # STORAGE
  # ===========================================================================
  # Platform provisions this as S3 (AWS), GCS (GCP), or MinIO (local)
  # Bucket name is injected as BUCKET_NAME environment variable
  
  storage:
    type: s3
    versioning: true
    encryption: true

  # ===========================================================================
  # OBSERVABILITY
  # ===========================================================================
  # Platform configures Prometheus scraping, tracing, and log collection
  
  observability:
    metrics:
      enabled: true
      path: /metrics
      port: 9090
    tracing:
      enabled: true
      sampleRate: "0.1"  # 10% sampling
    logging:
      format: json

  # ===========================================================================
  # DEPENDENCIES
  # ===========================================================================
  # Other Applications this service depends on.
  # Used for service graph, deployment ordering, and impact analysis.
  
  dependencies:
    - name: orders-api
      namespace: default
      required: true  # Block startup if unavailable
    - name: notification-svc
      namespace: default
      required: false

---
# =============================================================================
# MINIMAL EXAMPLE
# =============================================================================
# The simplest valid Application - just team, owner, and an image.
# Platform uses sensible defaults for everything else.

apiVersion: platform.platform.goplatform.io/v1alpha1
kind: Application
metadata:
  name: hello-world
  namespace: default
spec:
  team: demo
  owner: demo@example.com
  
  workload:
    image: nginx:latest
