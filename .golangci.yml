version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - bodyclose
    - noctx
    - prealloc
    - whitespace

  settings:
    misspell:
      locale: US

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/abd-ulbasit/goplatform

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - dupl

    - path: zz_generated
      linters:
        - all
