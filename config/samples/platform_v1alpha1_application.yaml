apiVersion: platform.platform.goplatform.io/v1alpha1
kind: Application
metadata:
  labels:
    app.kubernetes.io/name: goplatform
    app.kubernetes.io/managed-by: kustomize
  name: application-sample
spec:
  team: platform
  owner: platform@example.com
  tier: development

  database:
    type: postgres
    size: small
    version: "15"
    highAvailability: false

  cache:
    type: redis
    size: small
    highAvailability: false

  queue:
    type: rabbitmq
    fifo: false

  storage:
    type: s3
