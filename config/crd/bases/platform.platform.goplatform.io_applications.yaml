---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: applications.platform.platform.goplatform.io
spec:
  group: platform.platform.goplatform.io
  names:
    kind: Application
    listKind: ApplicationList
    plural: applications
    singular: application
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.team
      name: Team
      type: string
    - jsonPath: .spec.tier
      name: Tier
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Application is the Schema for the applications API.
          It represents a complete application with its workload and infrastructure.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired state of the Application.
            properties:
              cache:
                description: Cache configures a managed cache (Redis/Memcached) for
                  this application.
                properties:
                  highAvailability:
                    default: false
                    description: HighAvailability enables replication.
                    type: boolean
                  size:
                    default: small
                    description: Size is the resource size abstraction.
                    enum:
                    - small
                    - medium
                    - large
                    - xlarge
                    type: string
                  type:
                    description: Type is the cache engine (redis, memcached).
                    enum:
                    - redis
                    - memcached
                    type: string
                required:
                - type
                type: object
              database:
                description: Database configures a managed database for this application.
                properties:
                  backup:
                    description: Backup configures automated backup settings.
                    properties:
                      enabled:
                        default: true
                        description: Enabled turns on automated backups.
                        type: boolean
                      retentionDays:
                        default: 7
                        description: RetentionDays is how long to keep backups.
                        format: int32
                        maximum: 35
                        minimum: 1
                        type: integer
                      window:
                        description: Window is the preferred backup window (e.g.,
                          "03:00-04:00").
                        pattern: ^([01]?[0-9]|2[0-3]):[0-5][0-9]-([01]?[0-9]|2[0-3]):[0-5][0-9]$
                        type: string
                    type: object
                  highAvailability:
                    default: false
                    description: |-
                      HighAvailability enables multi-AZ/replica deployment.
                      Critical tier applications should always enable this.
                    type: boolean
                  size:
                    default: small
                    description: |-
                      Size is the resource size abstraction.
                      The platform maps this to provider-specific instance types.
                    enum:
                    - small
                    - medium
                    - large
                    - xlarge
                    type: string
                  type:
                    description: Type is the database engine (postgres, mysql).
                    enum:
                    - postgres
                    - mysql
                    type: string
                  version:
                    description: |-
                      Version is the major version (e.g., "15" for PostgreSQL 15).
                      Minor/patch versions are managed by the platform.
                    pattern: ^[0-9]+$
                    type: string
                required:
                - type
                - version
                type: object
              dependencies:
                description: |-
                  Dependencies lists other Applications this service depends on.
                  Used for service discovery, deployment ordering, and impact analysis.
                items:
                  description: DependencySpec defines a service dependency.
                  properties:
                    name:
                      description: Name is the name of the dependent Application.
                      type: string
                    namespace:
                      description: |-
                        Namespace is the namespace of the dependent Application.
                        Defaults to the same namespace as this Application.
                      type: string
                    required:
                      default: false
                      description: |-
                        Required indicates if this dependency must be healthy.
                        If true, the application won't start if dependency is down.
                      type: boolean
                  required:
                  - name
                  type: object
                type: array
              observability:
                description: Observability configures metrics, tracing, and logging.
                properties:
                  logging:
                    description: Logging configures log collection.
                    properties:
                      format:
                        default: json
                        description: Format is the log output format.
                        enum:
                        - json
                        - logfmt
                        - text
                        type: string
                    type: object
                  metrics:
                    description: Metrics configures Prometheus metrics scraping.
                    properties:
                      enabled:
                        default: true
                        description: Enabled turns on metrics collection.
                        type: boolean
                      path:
                        default: /metrics
                        description: Path is the metrics endpoint (e.g., "/metrics").
                        type: string
                      port:
                        default: 9090
                        description: Port is the metrics port.
                        format: int32
                        type: integer
                    type: object
                  tracing:
                    description: Tracing configures distributed tracing.
                    properties:
                      enabled:
                        default: false
                        description: Enabled turns on distributed tracing.
                        type: boolean
                      sampleRate:
                        anyOf:
                        - type: integer
                        - type: string
                        default: "0.1"
                        description: SampleRate is the percentage of requests to trace
                          (0.0-1.0).
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                    type: object
                type: object
              owner:
                description: |-
                  Owner is the email or identifier of the primary owner.
                  This person receives critical alerts and is the escalation point.
                minLength: 1
                type: string
              queue:
                description: Queue configures a managed message queue for this application.
                properties:
                  deadLetterQueue:
                    description: DeadLetterQueue configures failed message handling.
                    properties:
                      enabled:
                        default: true
                        description: Enabled turns on dead letter queue.
                        type: boolean
                      maxReceiveCount:
                        default: 5
                        description: MaxReceiveCount is how many times to retry before
                          DLQ.
                        format: int32
                        maximum: 100
                        minimum: 1
                        type: integer
                    type: object
                  fifo:
                    default: false
                    description: |-
                      FIFO enables exactly-once, ordered delivery.
                      Only supported by some queue types (SQS FIFO, Kafka).
                    type: boolean
                  type:
                    description: Type is the queue system (sqs, rabbitmq, kafka).
                    enum:
                    - sqs
                    - rabbitmq
                    - kafka
                    type: string
                required:
                - type
                type: object
              scaling:
                description: Scaling defines horizontal pod autoscaling configuration.
                properties:
                  maxReplicas:
                    description: MaxReplicas is the maximum number of replicas.
                    format: int32
                    minimum: 1
                    type: integer
                  metrics:
                    description: Metrics defines the scaling metrics to use.
                    items:
                      description: ScalingMetric defines a metric for autoscaling.
                      properties:
                        target:
                          description: Target is the target value (percentage for
                            cpu/memory).
                          format: int32
                          maximum: 100
                          minimum: 1
                          type: integer
                        type:
                          description: Type is the metric type (cpu, memory, custom).
                          enum:
                          - cpu
                          - memory
                          - custom
                          type: string
                      required:
                      - target
                      - type
                      type: object
                    type: array
                  minReplicas:
                    default: 1
                    description: MinReplicas is the minimum number of replicas.
                    format: int32
                    minimum: 0
                    type: integer
                required:
                - maxReplicas
                type: object
              storage:
                description: Storage configures object storage (S3/GCS) for this application.
                properties:
                  encryption:
                    default: true
                    description: Encryption enables server-side encryption.
                    type: boolean
                  type:
                    description: Type is the storage system (s3, gcs).
                    enum:
                    - s3
                    - gcs
                    type: string
                  versioning:
                    default: false
                    description: Versioning enables object versioning.
                    type: boolean
                required:
                - type
                type: object
              team:
                description: |-
                  Team that owns this application. Used for access control,
                  cost allocation, and service discovery.
                maxLength: 63
                minLength: 1
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                type: string
              tier:
                default: standard
                description: |-
                  Tier indicates the service level for this application.
                  Affects SLAs, resource allocation, and monitoring thresholds.
                    - critical: 99.99% uptime SLA, highest priority
                    - standard: 99.9% uptime SLA, normal priority
                    - development: No SLA, can be disrupted during off-hours
                enum:
                - critical
                - standard
                - development
                type: string
              workload:
                description: |-
                  Workload defines the container workload to deploy.
                  If not specified, only infrastructure is provisioned.
                properties:
                  args:
                    description: Args provides arguments to the command.
                    items:
                      type: string
                    type: array
                  command:
                    description: Command overrides the container entrypoint.
                    items:
                      type: string
                    type: array
                  env:
                    description: |-
                      Env defines environment variables for the container.
                      Database connection strings are automatically injected.
                    items:
                      description: EnvVar represents an environment variable present
