                      properties:
                        name:
                          description: |-
                            Name of the environment variable.
                            May consist of any printable ASCII characters except '='.
                          type: string
                        value:
                          description: |-
                            Variable references $(VAR_NAME) are expanded
                            using the previously defined environment variables in the container and
                            any service environment variables. If a variable cannot be resolved,
                            the reference in the input string will be unchanged. Double $$ are reduced
                            to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                            "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                            Escaped references will never be expanded, regardless of whether the variable
                            exists or not.
                            Defaults to "".
                          type: string
                        valueFrom:
                          description: Source for the environment variable's value.
                            Cannot be used if value is not empty.
                          properties:
                            configMapKeyRef:
                              description: Selects a key of a ConfigMap.
                              properties:
                                key:
                                  description: The key to select.
                                  type: string
                                name:
                                  default: ""
                                  description: |-
                                    Name of the referent.
                                    This field is effectively required, but due to backwards compatibility is
                                    allowed to be empty. Instances of this type with an empty value here are
                                    almost certainly wrong.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                                optional:
                                  description: Specify whether the ConfigMap or its
                                    key must be defined
                                  type: boolean
                              required:
                              - key
                              type: object
                              x-kubernetes-map-type: atomic
                            fieldRef:
                              description: |-
                                Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                                spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                              properties:
                                apiVersion:
                                  description: Version of the schema the FieldPath
                                    is written in terms of, defaults to "v1".
                                  type: string
                                fieldPath:
                                  description: Path of the field to select in the
                                    specified API version.
                                  type: string
                              required:
                              - fieldPath
                              type: object
                              x-kubernetes-map-type: atomic
                            fileKeyRef:
                              description: |-
                                FileKeyRef selects a key of the env file.
                                Requires the EnvFiles feature gate to be enabled.
                              properties:
                                key:
                                  description: |-
                                    The key within the env file. An invalid key will prevent the pod from starting.
                                    The keys defined within a source may consist of any printable ASCII characters except '='.
                                    During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
                                  type: string
                                optional:
                                  default: false
                                  description: |-
                                    Specify whether the file or its key must be defined. If the file or key
                                    does not exist, then the env var is not published.
                                    If optional is set to true and the specified key does not exist,
                                    the environment variable will not be set in the Pod's containers.

                                    If optional is set to false and the specified key does not exist,
                                    an error will be returned during Pod creation.
                                  type: boolean
                                path:
                                  description: |-
                                    The path within the volume from which to select the file.
                                    Must be relative and may not contain the '..' path or start with '..'.
                                  type: string
                                volumeName:
                                  description: The name of the volume mount containing
                                    the env file.
                                  type: string
                              required:
                              - key
                              - path
                              - volumeName
                              type: object
                              x-kubernetes-map-type: atomic
                            resourceFieldRef:
                              description: |-
                                Selects a resource of the container: only resources limits and requests
                                (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                              properties:
                                containerName:
                                  description: 'Container name: required for volumes,
                                    optional for env vars'
                                  type: string
                                divisor:
                                  anyOf:
                                  - type: integer
                                  - type: string
                                  description: Specifies the output format of the
                                    exposed resources, defaults to "1"
                                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                  x-kubernetes-int-or-string: true
                                resource:
                                  description: 'Required: resource to select'
                                  type: string
                              required:
                              - resource
                              type: object
                              x-kubernetes-map-type: atomic
                            secretKeyRef:
                              description: Selects a key of a secret in the pod's
                                namespace
                              properties:
                                key:
                                  description: The key of the secret to select from.  Must
                                    be a valid secret key.
                                  type: string
                                name:
                                  default: ""
                                  description: |-
                                    Name of the referent.
                                    This field is effectively required, but due to backwards compatibility is
                                    allowed to be empty. Instances of this type with an empty value here are
                                    almost certainly wrong.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                                optional:
                                  description: Specify whether the Secret or its key
                                    must be defined
                                  type: boolean
                              required:
                              - key
                              type: object
                              x-kubernetes-map-type: atomic
                          type: object
                      required:
                      - name
                      type: object
                    type: array
                  healthCheck:
                    description: HealthCheck configures liveness and readiness probes.
                    properties:
                      failureThreshold:
                        default: 3
                        description: FailureThreshold is consecutive failures to mark
                          unhealthy.
                        format: int32
                        type: integer
                      initialDelaySeconds:
                        default: 10
                        description: InitialDelaySeconds is seconds before first probe.
                        format: int32
                        type: integer
                      path:
                        description: Path is the HTTP path for health checks (e.g.,
                          "/health").
                        pattern: ^/.*$
                        type: string
                      periodSeconds:
                        default: 10
                        description: PeriodSeconds is how often to probe.
                        format: int32
                        type: integer
                      port:
                        description: Port is the port to check.
                        format: int32
                        maximum: 65535
                        minimum: 1
                        type: integer
                    required:
                    - path
                    - port
                    type: object
                  image:
                    description: |-
                      Image is the container image to run.
                      Examples: ghcr.io/company/app:v1.0.0, nginx:latest
                    minLength: 1
                    type: string
                  ports:
                    description: Ports defines the ports the container exposes.
                    items:
                      description: ContainerPort defines a port exposed by the container.
                      properties:
                        containerPort:
                          description: ContainerPort is the port number on the container.
                          format: int32
                          maximum: 65535
                          minimum: 1
                          type: integer
                        name:
                          description: Name is the port name (e.g., "http", "grpc",
                            "metrics").
                          type: string
                        protocol:
                          default: TCP
                          description: Protocol is the network protocol (TCP/UDP).
                          type: string
                      required:
                      - containerPort
                      - name
                      type: object
                    type: array
                  replicas:
                    default: 1
                    description: |-
                      Replicas is the desired number of pod replicas.
                      This is the initial count; HPA may scale up/down.
                    format: int32
                    minimum: 0
                    type: integer
                  resources:
                    description: Resources defines CPU and memory requests/limits.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                required:
                - image
                type: object
            required:
            - owner
            - team
            type: object
          status:
            description: Status defines the observed state of the Application.
            properties:
              conditions:
                description: |-
                  Conditions provide detailed status information.
                  Standard K8s conditions pattern - each condition type has status True/False/Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              estimatedMonthlyCost:
                description: |-
                  EstimatedMonthlyCost shows the estimated monthly cost.
                  Updated during provisioning based on selected resources.
                properties:
                  amount:
                    description: Amount is the total estimated monthly cost.
                    type: string
                  breakdown:
                    additionalProperties:
                      type: string
                    description: Breakdown shows per-resource costs.
                    type: object
                  currency:
                    default: USD
                    description: Currency is the currency code (USD, EUR, etc.).
                    type: string
                type: object
              infrastructure:
                description: |-
                  Infrastructure contains endpoints and references for provisioned resources.
                  Populated after successful provisioning.
                properties:
                  cache:
                    description: Cache contains cache connection information.
                    properties:
                      endpoint:
                        description: Endpoint is the cache host.
                        type: string
                      port:
                        description: Port is the cache port.
                        format: int32
                        type: integer
                    type: object
                  database:
                    description: Database contains database connection information.
                    properties:
                      endpoint:
                        description: Endpoint is the database host (e.g., mydb.xxx.rds.amazonaws.com).
                        type: string
                      port:
                        description: Port is the database port.
                        format: int32
                        type: integer
                      secretRef:
                        description: |-
                          SecretRef references the Secret containing credentials.
                          Secret contains: username, password, database, host, port, and connection_url.
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                    type: object
                  queue:
                    description: Queue contains queue URLs and ARNs.
                    properties:
                      arn:
                        description: ARN is the queue ARN (for AWS SQS).
                        type: string
                      deadLetterQueueUrl:
                        description: DeadLetterQueueURL is the DLQ URL if enabled.
                        type: string
                      url:
                        description: URL is the queue URL for sending messages.
                        type: string
                    type: object
                  storage:
                    description: Storage contains bucket information.
                    properties:
                      bucketName:
                        description: BucketName is the bucket name.
                        type: string
                      region:
                        description: Region is the bucket region.
                        type: string
                    type: object
                type: object
              observedGeneration:
                description: |-
                  ObservedGeneration is the spec generation last processed.
                  If this doesn't match metadata.generation, controller is still processing.
                format: int64
                type: integer
              phase:
                description: Phase is the high-level summary of application state.
                enum:
                - Pending
                - Provisioning
                - Ready
                - Failed
                - Deleting
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
